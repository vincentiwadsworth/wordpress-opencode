# Bedrock nginx overrides for DDEV
#
# Bedrock separates WordPress core (web/wp/) from content (web/app/).
# The DDEV webserver exposes "web/" as the document root.
# WordPress handles all URL routing via web/index.php.
#
# This file adds Bedrock-specific security hardening.

# Deny access to Bedrock/Composer sensitive files that should
# never be served publicly
location ~* ^/(composer\.(json|lock)|wp-config\.php|\.env(\..*)?|auth\.json) {
    deny all;
}

# Deny access to dot-files at the web root
location ~ /\. {
    deny all;
}
